name: Playwright Tests
on:
  push:
    branches: [ main, master ]
    paths:
      - 'tests/**'
      - 'playwright.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'tests/**'
      - 'playwright.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright.yml'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # TodoMVC only until Didaxis credentials are available as GitHub Actions secrets
    - name: Run Playwright tests
      run: npx playwright test tests/todo.spec.ts
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
